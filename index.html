<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광고콘텐츠제작 문제풀이</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* 메인 화면 */
        .main-screen {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .main-screen h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 40px;
        }

        .main-screen p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 50px;
        }

        .grade-buttons {
            display: flex;
            gap: 20px;
            flex-direction: column;
        }

        .grade-btn {
            padding: 25px;
            font-size: 1.3em;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .grade-btn-2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .grade-btn-2:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .grade-btn-3 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .grade-btn-3:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.4);
        }

        /* 문제풀이 화면 */
        .quiz-screen {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .quiz-screen.active {
            display: block;
        }

        .quiz-header {
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        .quiz-header h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .quiz-progress {
            color: #999;
            font-size: 0.9em;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .option-label:hover {
            background: #f5f5f5;
            border-color: #667eea;
        }

        .option-label.correct {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .option-label.correct .option-text::before {
            content: '✓ ';
            color: #4caf50;
            font-weight: bold;
        }

        .option-label.wrong {
            background: #ffebee;
            border-color: #f44336;
        }

        .option-label.wrong .option-text::before {
            content: '✗ ';
            color: #f44336;
            font-weight: bold;
        }

        .option-label input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option-label input[type="radio"]:checked ~ .option-text {
            color: #667eea;
            font-weight: bold;
        }

        .option-label.answer-revealed input[type="radio"] {
            pointer-events: none;
        }

        .option-text {
            flex: 1;
            text-align: left;
        }

        .answer-feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
        }

        .feedback-correct {
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #4caf50;
        }

        .feedback-wrong {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #f44336;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            justify-content: space-between;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-back {
            background: #f0f0f0;
            color: #333;
            flex: 1;
        }

        .btn-back:hover {
            background: #e0e0e0;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 0 0 auto;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        /* 결과 화면 */
        .result-screen {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            display: none;
        }

        .result-screen.active {
            display: block;
        }

        .result-score {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
        }

        .result-message {
            font-size: 1.3em;
            color: #666;
            margin-bottom: 40px;
        }

        .result-details {
            background: #f5f5f5;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: left;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #666;
        }

        .detail-value {
            font-weight: bold;
            color: #333;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            font-size: 1em;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 600px) {
            .main-screen,
            .quiz-screen,
            .result-screen {
                padding: 30px 20px;
            }

            .main-screen h1 {
                font-size: 1.8em;
            }

            .grade-buttons {
                gap: 15px;
            }

            .grade-btn {
                padding: 20px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 메인 선택 화면 -->
        <div class="main-screen" id="mainScreen">
            <h1>📚 광고콘텐츠제작</h1>
            <p>학년을 선택하여 시작하세요</p>
            <div class="grade-buttons">
                <button class="grade-btn grade-btn-2" onclick="startQuiz(2)">2학년 광고콘텐츠제작</button>
                <button class="grade-btn grade-btn-3" onclick="startQuiz(3)">3학년 광고콘텐츠제작</button>
            </div>
        </div>

        <!-- 문제풀이 화면 -->
        <div class="quiz-screen" id="quizScreen">
            <div class="quiz-header">
                <h2 id="gradeTitle">2학년 광고콘텐츠제작</h2>
                <div class="quiz-progress">
                    <span id="currentQuestion">1</span> / <span id="totalQuestions">10</span>
                </div>
            </div>
            <div class="question-container">
                <div class="question-text" id="questionText">문제가 로드되고 있습니다...</div>
                <div class="options" id="optionsContainer"></div>
            </div>
            <div class="button-group">
                <button class="btn btn-back" onclick="backToMain()">◀ 뒤로</button>
                <button class="btn btn-next" onclick="nextQuestion()" id="nextBtn">다음 ▶</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div class="result-screen" id="resultScreen">
            <h2>시험 완료!</h2>
            <div class="result-score" id="resultScore">80/100</div>
            <div class="result-message" id="resultMessage">잘했어요! 계속 공부하세요!</div>
            <div class="result-details">
                <div class="detail-item">
                    <span class="detail-label">맞은 문제</span>
                    <span class="detail-value" id="correctCount">8</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">틀린 문제</span>
                    <span class="detail-value" id="wrongCount">2</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">정답률</span>
                    <span class="detail-value" id="correctRate">80%</span>
                </div>
            </div>
            <button class="btn btn-restart" onclick="backToMain()">다시 풀기</button>
        </div>
    </div>

    <script>
        let questions = [];
        let currentQuestionIndex = 0;
        let currentGrade = 0;
        let answers = [];
        let selectedAnswers = [];
        let answerChecked = false;

        // 배열 셔플 함수 (Fisher-Yates)
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 데이터 로드
        fetch('questions.json')
            .then(response => response.json())
            .then(data => {
                questions = data;
            })
            .catch(error => console.error('데이터 로드 실패:', error));

        function startQuiz(grade) {
            currentGrade = grade;
            currentQuestionIndex = 0;
            selectedAnswers = [];
            answers = [];
            answerChecked = false;

            // 선택한 학년의 문제 필터링
            const gradeQuestions = questions.filter(q => q.grade === grade);
            // 문제 순서 랜덤으로 섞기
            questions = shuffleArray(gradeQuestions);

            if (questions.length === 0) {
                alert('해당 학년의 문제가 없습니다.');
                return;
            }

            // 화면 전환
            document.getElementById('mainScreen').classList.remove('active');
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('quizScreen').classList.add('active');
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('resultScreen').style.display = 'none';

            // 타이틀 설정
            const gradeText = grade === 2 ? '2학년' : '3학년';
            document.getElementById('gradeTitle').textContent = gradeText + ' 광고콘텐츠제작';
            document.getElementById('totalQuestions').textContent = questions.length;

            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showResult();
                return;
            }

            answerChecked = false;
            const question = questions[currentQuestionIndex];
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            
            // 질문 텍스트 설정 (이미지 처리 포함)
            const questionContainer = document.getElementById('questionText');
            let questionText = question.question;
            
            // [이미지: 파일명] 패턴 찾기 및 처리
            const imageMatch = questionText.match(/\[이미지:\s*(.+?)\]/);
            if (imageMatch) {
                const imageFile = imageMatch[1].trim();
                const cleanQuestion = questionText.replace(/\[이미지:.+?\]\s*/, '').trim();
                
                questionContainer.innerHTML = `${cleanQuestion}<br><br><img src="${imageFile}" style="max-width: 100%; max-height: 300px; border-radius: 10px; margin: 20px 0;">`;
            } else {
                questionContainer.textContent = questionText;
            }

            // 선택지와 정답을 함께 셔플
            const optionsWithIndex = question.options.map((option, index) => ({
                text: option,
                originalIndex: index
            }));
            const shuffledOptions = shuffleArray(optionsWithIndex);

            // 정답이 배열인지 단일 값인지 확인
            const correctAnswers = Array.isArray(question.correct) ? question.correct : [question.correct];
            
            // 셔플된 옵션에서 정답 인덱스 찾기
            const correctIndices = correctAnswers.map(correctAnswer => 
                shuffledOptions.findIndex(opt => opt.originalIndex === correctAnswer)
            );
            question.correctIndices = correctIndices;
            question.isMultipleAnswers = Array.isArray(question.correct) && question.correct.length > 1;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            // 초기화: 이전에 선택한 답이 없으면 빈 배열
            if (!Array.isArray(selectedAnswers[currentQuestionIndex])) {
                selectedAnswers[currentQuestionIndex] = [];
            }

            shuffledOptions.forEach((option, index) => {
                const label = document.createElement('label');
                label.className = 'option-label';

                const input = document.createElement('input');
                input.type = question.isMultipleAnswers ? 'checkbox' : 'radio';
                input.name = question.isMultipleAnswers ? `option-${currentQuestionIndex}` : 'option';
                input.value = index;
                input.onchange = () => {
                    if (question.isMultipleAnswers) {
                        // 체크박스: 복수 선택
                        if (input.checked) {
                            if (!selectedAnswers[currentQuestionIndex].includes(index)) {
                                selectedAnswers[currentQuestionIndex].push(index);
                            }
                        } else {
                            selectedAnswers[currentQuestionIndex] = selectedAnswers[currentQuestionIndex].filter(i => i !== index);
                        }
                    } else {
                        // 라디오: 단일 선택
                        selectedAnswers[currentQuestionIndex] = [index];
                    }
                };

                const span = document.createElement('span');
                span.className = 'option-text';
                span.textContent = option.text;

                label.appendChild(input);
                label.appendChild(span);
                optionsContainer.appendChild(label);
            });

            // 이전에 선택한 답 복원
            if (Array.isArray(selectedAnswers[currentQuestionIndex]) && selectedAnswers[currentQuestionIndex].length > 0) {
                selectedAnswers[currentQuestionIndex].forEach(selectedIndex => {
                    const checkbox = document.querySelector(`input[value="${selectedIndex}"]`);
                    if (checkbox) checkbox.checked = true;
                });
            }

            updateButtonState();
        }

        function updateButtonState() {
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.textContent = currentQuestionIndex + 1 >= questions.length ? '결과 보기 ▶' : '다음 문제 ▶';
            nextBtn.disabled = false;
        }

        function checkAnswer() {
            const question = questions[currentQuestionIndex];
            const selectedIndices = selectedAnswers[currentQuestionIndex] || [];
            const optionsContainer = document.getElementById('optionsContainer');
            const optionLabels = optionsContainer.querySelectorAll('.option-label');

            // 모든 선택지 비활성화
            optionLabels.forEach(label => {
                label.classList.add('answer-revealed');
                const input = label.querySelector('input');
                input.disabled = true;
            });

            // 정답 표시
            question.correctIndices.forEach(correctIndex => {
                optionLabels[correctIndex].classList.add('correct');
            });

            // 선택한 답과 정답 비교
            let isCorrect = false;
            
            if (question.isMultipleAnswers) {
                // 복수 정답: 정렬된 배열로 비교
                const sortedSelected = selectedIndices.sort((a, b) => a - b);
                const sortedCorrect = question.correctIndices.sort((a, b) => a - b);
                isCorrect = sortedSelected.length === sortedCorrect.length && 
                           sortedSelected.every((val, idx) => val === sortedCorrect[idx]);
            } else {
                // 단일 정답
                isCorrect = selectedIndices.length === 1 && 
                           selectedIndices[0] === question.correctIndices[0];
            }

            // 선택한 답이 정답이 아니면 표시
            if (!isCorrect) {
                selectedIndices.forEach(selectedIndex => {
                    optionLabels[selectedIndex].classList.add('wrong');
                });
            }

            // 피드백 메시지 추가
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = isCorrect ? 'answer-feedback feedback-correct' : 'answer-feedback feedback-wrong';
            feedbackDiv.textContent = isCorrect ? '✓ 정답입니다!' : '✗ 오답입니다';
            optionsContainer.appendChild(feedbackDiv);

            answerChecked = true;
            updateButtonState();
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex >= questions.length) {
                showResult();
            } else {
                loadQuestion();
            }
        }

        function backToMain() {
            // 초기화
            currentQuestionIndex = 0;
            selectedAnswers = [];
            answers = [];
            questions = [];
            answerChecked = false;

            // 화면 전환
            document.getElementById('mainScreen').style.display = 'block';
            document.getElementById('mainScreen').classList.add('active');
            document.getElementById('quizScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.remove('active');

            // 데이터 다시 로드
            fetch('questions.json')
                .then(response => response.json())
                .then(data => {
                    questions = data;
                })
                .catch(error => console.error('데이터 로드 실패:', error));
        }

        function showResult() {
            // 정답 체크
            let correct = 0;
            questions.forEach((question, index) => {
                const selectedIndices = (selectedAnswers[index] || []).sort((a, b) => a - b);
                const correctIndices = (question.correctIndices || []).sort((a, b) => a - b);
                
                const isCorrect = selectedIndices.length === correctIndices.length && 
                                 selectedIndices.every((val, idx) => val === correctIndices[idx]);
                
                if (isCorrect) {
                    correct++;
                }
            });

            const total = questions.length;
            const percentage = Math.round((correct / total) * 100);

            // 결과 메시지
            let message = '';
            if (percentage >= 90) {
                message = '완벽해요! 🎉';
            } else if (percentage >= 70) {
                message = '잘했어요! 👍';
            } else if (percentage >= 50) {
                message = '더 공부하면 되겠네요! 💪';
            } else {
                message = '다시 한번 공부해보세요! 📚';
            }

            // 결과 화면 업데이트
            document.getElementById('resultScore').textContent = correct + '/' + total;
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = total - correct;
            document.getElementById('correctRate').textContent = percentage + '%';

            // 화면 전환
            document.getElementById('quizScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');
            document.getElementById('resultScreen').style.display = 'block';
        }
    </script>
</body>
</html>
